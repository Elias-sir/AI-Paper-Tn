<body>
  <div class="propose-container">
    <h1>Proposer une IA</h1>
    <p>Noté le nom , l'idée ou la description de AI que vous n'avez pas trouvez dans notre feed </p>

    <form id="propose-ai-form">
      <label for="ai-name">Nom de l'IA</label>
      <input type="text" id="ai-name" name="ai-name" placeholder="Ex: GPT-Tunis" required>

      <label for="ai-use-case">A Quoi elle sert </label>
      <input type="text" id="ai-use-case" name="ai-use-case" placeholder="Ex: chat, marketing">

      <button type="submit">Soumettre</button>
    </form>

    <p class="info">Merci de vous assurez que l'Ai demander existe et n'hesitez pas a mentionné si c'est vous le createur. </p>
